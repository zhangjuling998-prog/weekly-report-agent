<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经营分析智能体 — 设置</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #F5F5F7;
  color: #1D1D1F;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-app-region: drag;
}
.card {
  background: #fff;
  border-radius: 18px;
  padding: 36px 40px 32px;
  width: 100%;
  max-width: 520px;
  border: 0.5px solid #D2D2D7;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  -webkit-app-region: no-drag;
}
.logo { font-size: 48px; text-align: center; margin-bottom: 12px; }
h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.subtitle { color: #6E6E73; font-size: 13px; text-align: center; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 600; color: #3A3A3C; margin-bottom: 6px; }
.hint { font-size: 12px; color: #8E8E93; margin-top: 4px; }
input, select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #D2D2D7;
  border-radius: 10px;
  font-size: 14px;
  color: #1D1D1F;
  background: #FAFAFA;
  outline: none;
  transition: border-color 0.15s;
  -webkit-app-region: no-drag;
}
input:focus, select:focus { border-color: #007AFF; background: #fff; }
input[type="password"] { font-family: monospace; letter-spacing: 2px; }
.row { display: flex; gap: 12px; }
.row .form-group { flex: 1; }
.btn-save {
  width: 100%;
  background: #007AFF;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
  -webkit-app-region: no-drag;
}
.btn-save:hover { background: #0066DD; }
.btn-save:active { background: #0055CC; }
.success {
  display: none;
  background: rgba(52,199,89,0.1);
  border: 1px solid rgba(52,199,89,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #248A3D;
  text-align: center;
  margin-top: 12px;
}
.version { text-align: center; font-size: 11px; color: #C7C7CC; margin-top: 20px; }
.toggle-pw {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  color: #8E8E93;
  -webkit-app-region: no-drag;
}
.input-wrap { position: relative; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📊</div>
  <h1>经营分析智能体</h1>
  <p class="subtitle">请配置大模型接入参数，首次使用必填</p>

  <div class="form-group">
    <label>API Key <span style="color:#FF3B30">*</span></label>
    <div class="input-wrap">
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      <span class="toggle-pw" onclick="togglePw()">👁</span>
    </div>
    <div class="hint">用于调用大模型生成报告。请勿泄露此密钥。</div>
  </div>

  <div class="form-group">
    <label>API Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://semir.onerouter.com/api">
    <div class="hint">留空则使用默认地址。如使用 OpenAI 兼容接口，填写对应地址。</div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>模型</label>
      <select id="model">
        <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
        <option value="claude-opus-4-5">claude-opus-4-5</option>
        <option value="claude-haiku-3-5">claude-haiku-3-5</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="custom">自定义...</option>
      </select>
    </div>
    <div class="form-group" id="customModelGroup" style="display:none">
      <label>自定义模型名</label>
      <input type="text" id="customModel" placeholder="your-model-name">
    </div>
  </div>

  <button class="btn-save" onclick="save()">保存并启动</button>
  <div class="success" id="successMsg">✅ 已保存，应用将自动重载</div>

  <div class="version" id="versionLabel">v—</div>
</div>

<script>
async function init() {
  if (!window.electronAPI) return
  const cfg = await window.electronAPI.loadConfig()
  if (cfg.apiKey)  document.getElementById('apiKey').value  = cfg.apiKey
  if (cfg.baseUrl) document.getElementById('baseUrl').value = cfg.baseUrl
  if (cfg.model) {
    const sel = document.getElementById('model')
    const opt = [...sel.options].find(o => o.value === cfg.model)
    if (opt) sel.value = cfg.model
    else {
      sel.value = 'custom'
      document.getElementById('customModelGroup').style.display = ''
      document.getElementById('customModel').value = cfg.model
    }
  }
  const ver = await window.electronAPI.getVersion()
  document.getElementById('versionLabel').textContent = `v${ver}`
}

document.getElementById('model').addEventListener('change', () => {
  const isCustom = document.getElementById('model').value === 'custom'
  document.getElementById('customModelGroup').style.display = isCustom ? '' : 'none'
})

function togglePw() {
  const inp = document.getElementById('apiKey')
  inp.type = inp.type === 'password' ? 'text' : 'password'
}

async function save() {
  const apiKey  = document.getElementById('apiKey').value.trim()
  const baseUrl = document.getElementById('baseUrl').value.trim()
  let   model   = document.getElementById('model').value
  if (model === 'custom') model = document.getElementById('customModel').value.trim()

  if (!apiKey) {
    document.getElementById('apiKey').focus()
    document.getElementById('apiKey').style.borderColor = '#FF3B30'
    return
  }
  document.getElementById('apiKey').style.borderColor = ''

  await window.electronAPI.saveConfig({ apiKey, baseUrl, model })
  document.getElementById('successMsg').style.display = 'block'

  // 通知主进程重启 Streamlit（带新配置）
  await window.electronAPI.restartStreamlit()
}

init()
</script>
</body>
</html>
